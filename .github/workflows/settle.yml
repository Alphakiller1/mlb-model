name: settle-model-leans

on:
  schedule:
    # Post-slate grading: 2 AM ET (07:00), 8 AM ET (13:00), noon ET (17:00), 6 PM ET (23:00) UTC
    - cron: "0 7,13,17,23 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install .
      - name: Refresh finals and grade leans
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -m mlbmodel.sources.build_game_results
          python -m mlbmodel.market.settle
          python scripts/check_pending_leans.py
