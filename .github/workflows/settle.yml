name: settle-model-leans

on:
  schedule:
    # Post-slate grading: 2 AM ET (07:00 UTC) and 8 AM ET (13:00 UTC) safety net
    - cron: "0 7,13 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install .
      - name: Refresh finals and grade leans
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -m mlbmodel.sources.build_game_results
          python -m mlbmodel.market.settle
