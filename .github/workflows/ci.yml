name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: pip install -e ".[dev]"
      - name: ruff
        run: ruff check mlbmodel
      - name: pytest (Constitution invariants)
        run: pytest -q
