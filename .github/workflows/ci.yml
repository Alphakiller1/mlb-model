name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install
        run: pip install -e ".[dev]"
      - name: ruff
        run: ruff check mlbmodel tests
      - name: shell syntax
        run: bash -n refresh.sh
      - name: self-contained imports
        run: python -c "import mlbmodel.report.app; import mlbmodel.market.collect"
      - name: pytest (Constitution invariants)
        run: pytest -q
      - name: checkout mlbma-pipeline (CSS source)
        uses: actions/checkout@v6
        with:
          repository: Alphakiller1/mlbma-pipeline
          path: mlbma-pipeline
          fetch-depth: 1
        continue-on-error: true
        id: mlbma
      - name: chase css drift
        if: steps.mlbma.outcome == 'success'
        run: python scripts/sync_chase_css.py --source mlbma-pipeline --check
