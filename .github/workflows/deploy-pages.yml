name: deploy-pages

on:
  push:
    branches:
      - main
      - codex/unified-model-foundation
  repository_dispatch:
    types:
      - mlbma-pipeline-complete
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: vars.PAGES_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install model
        run: pip install .
      - name: Synchronize MLBMA run inputs
        run: |
          mkdir -p _deploy_data
          cp deployment_data/game_results.csv _deploy_data/
          python -m mlbmodel.sources.sync_mlbma --out _deploy_data
      - name: Build static research dashboard
        env:
          MLB_MODEL_DEPLOYMENT_NOTICE: >-
            Synchronized MLBMA research build. Live odds and betting-warehouse credentials
            are not connected; no displayed state is a wager instruction.
        run: |
          mkdir -p _site
          python -m mlbmodel.report.app \
            --game HOU@DET \
            --data-dir _deploy_data \
            --out _site/index.html \
            --no-fetch
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: vars.PAGES_ENABLED == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
